    <script>
      // Resolve o tema ANTES da primeira pintura: sem isto o modo escuro pisca
      // branco a cada carregamento. É também o que permite os tokens escuros
      // existirem uma única vez no CSS (só sob [data-tema="escuro"]).
      (function () {
        try {
          var salvo = localStorage.getItem("trans:tema");
          var escuro =
            salvo === "escuro" ||
            (!salvo && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.tema = escuro ? "escuro" : "claro";
        } catch (e) {
          document.documentElement.dataset.tema = "claro";
        }
      })();
    </script>
